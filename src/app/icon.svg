<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
    
    <!-- Accent / Bolt Gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular Outer Border -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGrad)" stroke="#10b981" stroke-width="12" />
  
  <!-- Outer Hexagonal Accent -->
  <polygon points="250,65 410,157 410,343 250,435 90,343 90,157" fill="none" stroke="#047857" stroke-width="4" opacity="0.6" stroke-dasharray="12, 12" />

  <!-- Horizontal bar of the 'T' -->
  <path d="M 130 150 L 370 150 A 15 15 0 0 1 370 180 L 130 180 A 15 15 0 0 1 130 150 Z" fill="#ffffff" filter="url(#glow)" />
  
  <!-- Lightning Bolt (T stem & EV Spark) -->
  <path d="M 275 180 
           L 175 315 
           L 260 315 
           L 190 440 
           L 350 285 
           L 265 285 
           Z" 
        fill="url(#boltGrad)" 
        filter="url(#glow)" />

  <!-- Inner Spark Circle Track -->
  <circle cx="250" cy="250" r="195" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="4, 18" />
</svg>
