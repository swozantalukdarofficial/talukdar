<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/png" href="/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="High-end web agency specializing in AI-powered SEO, AEO, and GEO."
		/>
		<title>WeBestOne - Your Guide in Automated World</title>

		<!-- DNS Prefetch & Preconnect for external resources -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="dns-prefetch" href="https://img.youtube.com" />
		<link rel="dns-prefetch" href="https://www.youtube.com" />
		<link rel="dns-prefetch" href="https://i.ytimg.com" />

		<!-- Preload LCP image (local hero thumbnail — eliminates external CDN delay) -->
		<link
			rel="preload"
			as="image"
			href="/hero-thumbnail.webp"
			fetchpriority="high"
		/>

		<!-- Static Fallback Canonical Link -->
		<link rel="canonical" href="https://webestone.com/" />

		<!-- Google Fonts asynchronously loaded to eliminate render-blocking delay -->
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
			media="print"
			onload="this.media='all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
				rel="stylesheet"
			/>
		</noscript>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
